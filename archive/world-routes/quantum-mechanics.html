      post:'gottingen_1926' },
    { year:'1926', place:'스위스 취리히', lat:47.3744, lng:8.5486, zoom:5,

      post:'schrodinger_1926' },
    { year:'1927', place:'덴마크 코펜하겐', lat:55.6870, lng:12.5760, zoom:5,
      title:'불확정성 원리와 상보성',
      desc:'보어의 연구소에서 하이젠베르크가 불확정성 원리에 도달한다 — 위치와 운동량은 동시에 정확히 알 수 없고, 이는 기술의 한계가 아니라 자연의 성질이다. 보어의 상보성과 함께 "코펜하겐 해석"의 뼈대가 된다.',

    { year:'1927', place:'벨기에 브뤼셀', lat:50.8467, lng:4.3720, zoom:5,

      desc:'참석자 29명 중 17명이 노벨상 수상자. 아침마다 아인슈타인이 양자역학을 무너뜨릴 사고실험을 내놓고, 저녁마다 보어가 반박한다. "신은 주사위를 던지지 않는다" — "신더러 이래라저래라 하지 마시오."',
      post:'solvay_1927' },
    { year:'1928', place:'영국 케임브리지', lat:52.2043, lng:0.1149, zoom:5,
      title:'디랙 방정식 — 수학이 예언한 반물질',
      desc:'과묵한 폴 디랙이 양자역학과 특수상대성이론을 결합한 방정식에서 반물질의 존재를 순수하게 수학으로 예측한다. 4년 뒤 우주선 사진 속에서 양전자가 실제로 발견된다.',
      post:'gottingen_1926' },
    { year:'1935', place:'미국 프린스턴', lat:40.3431, lng:-74.6551, zoom:4,
      title:'EPR 역설 — 아인슈타인의 마지막 반격',
      desc:'나치를 피해 미국에 정착한 아인슈타인이 "유령 같은 원격작용"은 불가능하므로 양자역학은 불완전하다고 반격한다. 같은 해 슈뢰딩거는 "얽힘"이라는 이름과 그 유명한 고양이를 내놓는다.',

    { year:'1964', place:'스위스 제네바 CERN', lat:46.2330, lng:6.0557, zoom:5,
      title:'벨 부등식 — 철학, 실험이 되다',
      desc:'CERN의 존 벨이 휴가 중 쓴 짧은 논문으로, 30년간 검증 불가능한 철학으로 취급되던 아인슈타인-보어 논쟁을 실험으로 판가름할 수 있는 수학으로 바꿔놓는다.',
      post:'bell_aspect' },
    { year:'1982', place:'프랑스 파리 오르세', lat:48.6976, lng:2.1873, zoom:5,
      title:'아스페 실험 — 얽힘은 실재한다',
      desc:'알랭 아스페가 광자가 날아가는 도중 측정 방향을 바꾸는 정교한 실험으로 벨 부등식이 깨짐을 확인한다. 얽힘은 실재했다. 아스페·클라우저·차일링거는 2022년 노벨상을 받는다.',
      post:'bell_aspect' },
    { year:'2019', place:'미국 샌타바버라', lat:34.4140, lng:-119.8489, zoom:4,
      title:'2차 양자혁명 — 양자컴퓨터의 시대',
      desc:'구글이 양자 프로세서로 "양자 우월성" 달성을 주장하며 경쟁에 불을 붙인다. 파인만의 1980년대 제안에서 시작된 2차 양자혁명 — 얽힘을 "부려 쓰는" 시대가 열리고 있다.',
      post:'korea_quantum_today' },
    { year:'오늘', place:'대한민국 대전', lat:36.3888, lng:127.3720, zoom:5,
      title:'대전의 실험실 — 한국의 양자과학',
      desc:'한국표준과학연구원(KRISS)이 국산 초전도 양자컴퓨터를 개발하고, 양자과학기술산업법이 제정되었다. 베를린에서 시작된 100년의 흐름에 한국이 당당한 참가자로 합류했다 — 다음 답의 일부는 한국어로 쓰일 것이다.',
      post:'korea_quantum_today' },
  ];

  // ── 지도 ──
  const map = L.map('map', { zoomControl: false, worldCopyJump: true })
    .setView([WAYPOINTS[0].lat, WAYPOINTS[0].lng], 5);
  L.control.zoom({ position: 'topright' }).addTo(map);
  // dark_nolabels: 국가/도시/바다 명칭 라벨이 없는 순수 지형 타일.
  // CartoDB dark_all은 동해를 "Sea of Japan(East Sea)" 병기로 표기하는데,
  // 이는 타일 자체에 래스터로 박힌 라벨이라 우리 쪽 지명 데이터로 고칠 수 없다.
  // 장소명은 어차피 마커·연도칩·하단 패널에서 우리가 직접 표기하므로
  // 베이스타일 라벨은 전부 제거하는 편이 정확하고 간단하다.
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 12, minZoom: 2
  }).addTo(map);

  // 경로선 — 시간 순서를 잇는 점선
  L.polyline(WAYPOINTS.map(w => [w.lat, w.lng]), {
    color: '#b89860', weight: 2, opacity: .55, dashArray: '6 8'
  }).addTo(map);

  // 지점 마커
  const markers = WAYPOINTS.map((w, i) => {
    const icon = L.divIcon({ className: '', html: `<div class="wp-marker" data-i="${i}">${i + 1}</div>`, iconSize: [26, 26], iconAnchor: [13, 13] });
    const m = L.marker([w.lat, w.lng], { icon }).addTo(map);
    m.on('click', () => go(i));
    return m;
  });

  // 연도 칩
  const chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = WAYPOINTS.map((w, i) => `<button class="chip" data-i="${i}">${i + 1}. ${w.year}</button>`).join('');
  chipsEl.addEventListener('click', e => {
    const b = e.target.closest('.chip');
    if (b) go(parseInt(b.dataset.i, 10));
  });

  // ── 패널 렌더 ──
  let cur = 0;
  const $ = id => document.getElementById(id);
  function go(i) {
    cur = Math.max(0, Math.min(WAYPOINTS.length - 1, i));
    const w = WAYPOINTS[cur];
    $('wpNum').textContent = cur + 1;
    $('wpYear').textContent = w.year;
    $('wpPlace').textContent = w.place;
    $('wpTitle').textContent = w.title;
    $('wpDesc').textContent = w.desc;
    $('wpLinks').innerHTML = w.post
      ? `<a href="../quantum-century/${w.post}.html">깊이 읽기 — 「양자역학 100년」 시리즈에서 이 장면 읽기 &rsaquo;</a>` : '';
    $('progress').textContent = `${cur + 1} / ${WAYPOINTS.length}`;
    $('prevBtn').disabled = cur === 0;
    $('nextBtn').disabled = cur === WAYPOINTS.length - 1;
    document.querySelectorAll('.wp-marker').forEach(el => el.classList.toggle('active', parseInt(el.dataset.i, 10) === cur));
    document.querySelectorAll('.chip').forEach(el => el.classList.toggle('active', parseInt(el.dataset.i, 10) === cur));
    const activeChip = chipsEl.querySelector('.chip.active');
    if (activeChip) activeChip.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    map.flyTo([w.lat, w.lng], w.zoom || 5, { duration: 1.1 });
    if (window.trackPageView) window.trackPageView('world_route_quantum', `wp_${cur + 1}`);
  }
  $('prevBtn').addEventListener('click', () => go(cur - 1));
  $('nextBtn').addEventListener('click', () => go(cur + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') go(cur - 1);
    if (e.key === 'ArrowRight') go(cur + 1);
  });

  // 자료실 글(예: planck_1900.html)의 "세계지도 루트에서 이 장면 보기"에서
  // ?point=post_id로 들어오면 해당 웨이포인트로 바로 진입시킨다.
  const qp = new URLSearchParams(location.search).get('point');
  const startIdx = qp ? WAYPOINTS.findIndex(w => w.post === qp) : -1;
  go(startIdx >= 0 ? startIdx : 0);
})();
</script>
</body>
</html>
