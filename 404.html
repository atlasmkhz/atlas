<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지도를 찾을 수 없습니다 · ATLAS by MKHZ</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root { --ink:#1a1714; --paper:#e8e0d0; --gold:#b89860; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;
    background:var(--ink); color:var(--paper);
    display:flex; align-items:center; justify-content:center;
    height:100vh; text-align:center; padding:24px;
  }
  .wrap { max-width:380px; }
  .compass {
    width:64px; height:64px; margin:0 auto 22px; opacity:0.9;
    animation:spin 14s linear infinite;
  }
  @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  h1 { font-size:20px; font-weight:800; letter-spacing:1px; margin-bottom:10px; }
  p { font-size:13px; color:rgba(232,224,208,0.65); line-height:1.6; margin-bottom:28px; }
  .home-btn {
    display:inline-block; background:rgba(184,152,96,0.15);
    border:1px solid rgba(184,152,96,0.5); color:var(--gold);
    font-size:13px; letter-spacing:0.5px; text-decoration:none;
    padding:12px 24px; border-radius:24px; transition:background 0.2s ease;
  }
  .home-btn:hover, .home-btn:active { background:rgba(184,152,96,0.28); }
</style>
</head>
<body>
  <div class="wrap">
    <img class="compass" src="favicon.svg" alt="" aria-hidden="true">
    <h1>지도를 찾을 수 없습니다</h1>
    <p>찾으시는 페이지가 시간의 흐름 속에서 사라졌거나,<br>주소가 정확하지 않습니다.</p>
    <a class="home-btn" href="/">역사 탐험 계속하기</a>
  </div>
</body>
</html>
