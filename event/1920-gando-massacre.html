<h1>간도 참변 (경신참변)</h1>
<p class="event-meta">1920년 11월 · 간도 전역</p>
<p class="summary">청산리 패전에 대한 보복으로 일본군이 간도의 한인 마을을 초토화했다. 장암동·송언동 학살, 명동학교 방화 등으로 최소 수천 명이 학살되었다. 승리 뒤에 찾아온 비극.</p>

    document.body.appendChild(overlay);

    window.ATLAS_loadMapShell().then(function () {
      if (typeof map !== 'undefined' && map.invalidateSize) map.invalidateSize();

      overlay.remove();

      console.error('지도 로드 실패:', err);

      msg.textContent = '지도를 불러오지 못했습니다.';

      retry.href = cta.href;

      overlay.appendChild(retry);
      if (article) article.style.display = '';
    });
  });
})();
