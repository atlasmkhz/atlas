<p class="event-meta">1920년 12월 · 조선총독부 (경성)</p>
<p class="summary">일본의 쌀 부족을 메우기 위해 조선을 식량 공급지로 삼은 정책(1차 1920~1925). 증산분보다 일본 반출량이 더 커서 조선인의 쌀 소비는 오히려 줄었고, 소작농은 궁핍해지고 지주제가 강화됐다. ‘문화통치’의 경제적 실체.</p>
