<h1>부산부두 노동자 총파업</h1>
<p class="event-meta">1921년 9월 · 부산</p>
<p class="summary">1921년 8월 부산 부두의 운수노동자 5,000여 명이 파업에 들어갔다. 우리나라 최초의 대규모 파업으로 15일간 계속됐고, 10~15%의 임금인상을 얻어냈다. 엘리트 독립운동이 자유시에서 무너지던 그해, 식민지 조선의 노동하는 민중은 또 다른 방식으로 일제와 자본에 맞서 스스로 일어섰다.</p>
