<h1>일본·국제 정세</h1>
<p class="event-meta">1920년 1월 · 도쿄</p>
<p class="summary">1차 대전 종전 후 일본은 경제 불황과 사회 갈등에 시달렸다. 러시아 내전에 개입한 시베리아 출병이 이어졌고, 이 병력이 간도 출병의 배경이 됐다. 베르사유 체제와 워싱턴 회의(1921) 전야로, 임정의 외교 독립론이 기대던 국제 환경이기도 했다.</p>
