<h1>나정 — 박혁거세 건국 설화의 현장</h1>
<p class="event-meta">-69 · 경주 남산지구</p>
<p class="summary">신라 건국 설화에서 박혁거세가 알에서 태어났다고 전해지는 우물터다. 발굴 조사에서 신라 초기의 대형 건물 유구가 확인돼, 실제로 이곳이 신라 왕실과 관련된 제사 시설이었을 가능성이 뒷받침됐다. 경주역사유적지구 남산지구에 포함된다.</p>
