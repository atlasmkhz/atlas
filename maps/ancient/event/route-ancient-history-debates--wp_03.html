<h1>고조선 멸망과 한사군 설치</h1>
<p class="event-meta">-108 · 왕검성(평양 추정)</p>
<p class="summary">한 무제의 공격으로 기원전 108년 왕검성이 함락되고 고조선이 멸망하자, 한나라는 옛 고조선 땅에 낙랑·진번·임둔·현도 네 군(한사군)을 설치했다. 이 가운데 가장 오래 존속한 낙랑군은 313년까지 한반도 서북부에 남아 있었다 — 이 낙랑군의 정확한 위치가 다음 논쟁의 핵심이다.</p>
