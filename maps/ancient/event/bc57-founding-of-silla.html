<h1>신라 건국</h1>
<p class="event-meta">기원전 57년 · 금성(경주)</p>
<p class="summary">경주 지역 여러 촌락의 우두머리들이 박혁거세를 왕으로 세워 사로국(훗날 신라)을 열었다. 이후 박·석·김 세 성씨가 번갈아 왕위를 이어가며 992년이라는, 한국 역사상 가장 오래 존속한 왕조로 성장했다.</p>
<section class="people"><h2>관련 인물</h2><ul class="related-people"><li>박혁거세</li></ul></section>

<section class="sources"><h2>참고 자료</h2><ul class="sources"><li>한국민족문화대백과사전 신라</li><li>위키백과 박혁거세</li></ul></section>
