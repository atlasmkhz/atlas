<h1>즉위 — 방계 친척, 갑작스레 왕위에 오르다</h1>
<p class="event-meta">346 · 한성(서울)</p>
<p class="summary">선왕이 즉위 3년 만에 갑작스레 세상을 떠나자, 먼 친척이던 그가 백제 13대 왕으로 즉위했다. 당시 백제는 한강 유역의 지역 강국 정도였지만, 서북부의 낙랑·대방군을 병합한 고구려와 국경을 맞대며 충돌 가능성이 커지던 긴장된 시기였다.</p>
