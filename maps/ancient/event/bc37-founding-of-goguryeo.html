<h1>고구려 건국</h1>
<p class="event-meta">기원전 37년 · 졸본(환인)</p>
<p class="summary">부여에서 남쪽으로 내려온 주몽(동명성왕)이 압록강 유역 졸본 지역에서 고구려를 세웠다. 산악과 하천이 많은 지형을 이용해 일찍부터 군사력을 키웠고, 이후 700년 가까이 존속하며 동북아시아의 강대국으로 성장했다.</p>
