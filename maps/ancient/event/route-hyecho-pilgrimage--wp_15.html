<h1>카슈가르 — 서역의 끝</h1>
<p class="event-meta">727 · 카슈가르(오늘날 신장 카스)</p>
<p class="summary">타클라마칸 사막 북쪽, 천산산맥을 끼고 도는 실크로드의 오아시스 도시 카슈가르에 이르렀다. 예로부터 서역과 중원을 잇는 교통의 요충지였던 이곳에서, 그는 이제 중국 문명권 안으로 다시 들어서고 있었다.</p>
