<h1>출생 — 평양 만경대</h1>
<p class="event-meta">1912 4월 15일 · 평양 만경대</p>
<p class="summary">1912년 평양 만경대의 기독교인 가정에서 김성주(본명)로 태어났다. 아버지 김형직은 항일 계열 단체에 몸담았던 인물로, 가족이 함께 만주로 이주하며 어린 시절을 그곳에서 보냈다. &quot;김일성&quot;이라는 이름은 이후 항일 무장투쟁 시기에 쓰기 시작한 이름이다.</p>
