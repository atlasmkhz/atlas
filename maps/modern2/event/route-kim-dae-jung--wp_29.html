<h1>서거</h1>
<p class="event-meta">2009 8월 18일 · 서울(신촌 세브란스병원)</p>
<p class="summary">폐렴 합병증으로 세상을 떠났다. 향년 85세. 국장으로 치러진 영결식에는 각계각층의 추모 인파가 이어졌다. 하의도의 소작농 아들로 태어나 납치·사형선고·두 번의 망명을 겪고도 끝내 대통령이 되고 노벨평화상까지 받은 85년의 생애가, 이렇게 막을 내렸다.</p>
