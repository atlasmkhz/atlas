<h1>컬러텔레비전 국내 연구 착수</h1>
<p class="event-meta">1969년 8월 1일 · 서울</p>
<p class="summary">1969년 금성사(현 LG전자)가 국내 최초로 흑백텔레비전 양산을 시작한 직후, 컬러텔레비전 기술에 대한 연구도 함께 시작됐다. 그러나 정부는 사치품 소비 억제와 빈부격차 우려를 이유로 컬러 방송 도입을 1980년까지 보류했다. 이 시차는 한국 가전산업의 기술력과 실제 방송·소비 환경 사이의 정책적 간극을 보여주는 사례로 남았다.</p>
