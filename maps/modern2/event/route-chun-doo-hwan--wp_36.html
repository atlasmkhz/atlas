<h1>백담사 유배</h1>
<p class="event-meta">1988 11월 23일 · 강원 인제 백담사</p>
<p class="summary">비리 의혹에 대한 여론이 악화되자 대국민 사과와 함께 재산 헌납을 발표하고, 부인과 함께 강원도 산골의 백담사로 은둔했다. 2년 가까운 이 &quot;유배&quot; 생활은 훗날 스스로 택한 정치적 제스처였다는 평가를 받는다.</p>
