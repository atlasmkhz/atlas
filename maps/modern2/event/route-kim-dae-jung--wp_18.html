<h1>제13대 대통령 선거 — 후보 단일화 실패로 낙선</h1>
<p class="event-meta">1987 12월 16일 · 전국</p>
<p class="summary">직선제로 치러진 첫 대선에서 김영삼과 후보 단일화에 끝내 실패하고 각자 출마했다. 민주화 세력의 표가 갈리며 여당의 노태우가 어부지리로 당선됐다. 독재에 맞서 함께 싸웠던 두 사람의 분열이 정권교체의 기회를 놓치게 만들었다는 비판이 오래도록 따라다녔다.</p>
