<h1>노벨평화상 수상</h1>
<p class="event-meta">2000 12월 10일 · 노르웨이 오슬로</p>
<p class="summary">한국과 동아시아 민주주의 발전, 그리고 남북 화해를 위한 노력을 인정받아 한국인 최초로 노벨평화상을 수상했다. 납치와 사형선고, 두 차례의 망명을 겪었던 정치인이 세계 최고 권위의 평화상을 받기까지, 30년에 가까운 시간이 흘러 있었다.</p>
