<h1>3·15 부정선거 — 독재의 균열이 시작되다</h1>
<p class="event-meta">1960 3월 15일 · 경남 마산</p>
<p class="summary">이승만 정권이 4선을 위해 개표 조작·투표함 바꿔치기 등 노골적인 부정선거를 자행하자, 마산에서 시민들이 대규모 항의 시위를 벌였다. 이 시위 중 실종됐던 고등학생 김주열의 시신이 최루탄이 눈에 박힌 채 마산 앞바다에서 발견되며 전국적인 분노에 불을 붙였다.</p>
