<h1>진주 국민보도연맹 학살</h1>
<p class="event-meta">1950 7월 25일 · 경남 진주 용산고개</p>
<p class="summary">진주경찰서와 진주형무소에 구금돼 있던 보도연맹원과 재소자들이 용산고개 등지로 끌려가 총살됐다. 인민군의 진주 공격이 임박하자 서둘러 진행된 처형이었다. 평소와 다름없이 소집에 응했던 이들 대부분은 자신이 어떤 처지에 놓였는지조차 모른 채 죽음을 맞았다.</p>
