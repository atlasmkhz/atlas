<h1>지방의회 선거 부활</h1>
<p class="event-meta">1991년 3월 26일 · 전국</p>
<p class="summary">1991년 3월 26일 기초의회 의원 선거, 6월 20일 광역의회 의원 선거가 잇따라 치러지며, 5·16 군사정변으로 중단됐던 지방자치제가 30년 만에 부활했다. 야당과 시민단체의 오랜 요구가 받아들여진 결과로, 주민들이 지역 의회를 직접 구성할 권리를 되찾은 것이었다. 다만 지방자치단체장 선거는 이때 포함되지 않았고, 단체장 직선은 1995년에야 실시된다.</p>
