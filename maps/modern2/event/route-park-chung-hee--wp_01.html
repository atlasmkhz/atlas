<h1>출생 — 경북 구미의 가난한 농가</h1>
<p class="event-meta">1917 11월 14일 · 경북 구미 선산</p>
<p class="summary">1917년 경북 구미 선산의 가난한 농가에서 5남 2녀 중 막내로 태어났다. 형편이 어려운 집안에서 자랐지만 성적이 우수해 대구사범학교에 진학했다. 훗날 대통령이 될 소년의 어린 시절은 평범한 가난한 농촌 소년의 그것이었다.</p>
