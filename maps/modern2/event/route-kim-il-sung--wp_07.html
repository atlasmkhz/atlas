<h1>조선민주주의인민공화국 수립</h1>
<p class="event-meta">1948 9월 9일 · 평양</p>
<p class="summary">대한민국 정부 수립(1948.8.15)에 이어, 북한 지역에도 김일성을 수상으로 하는 조선민주주의인민공화국이 수립됐다. 남과 북에 각각 별개의 정부가 들어서며 분단이 사실상 고착화됐다. 서른여섯의 나이로 그는 신생 국가의 최고 권력자가 됐다.</p>
