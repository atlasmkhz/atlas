<h1>제1연평해전</h1>
<p class="event-meta">1999년 6월 15일 · 서해 (연평도 인근 NLL)</p>
<p class="summary">서해 북방한계선(NLL)을 넘어온 북한 경비정에 남측 함정이 경고 사격과 격퇴 작전을 벌인 끝에 북한 경비정 1척이 격침되고 다수가 사상했다 — 남측은 부상자만 발생했다. 6·15 정상회담을 앞두고도 서해상 군사적 긴장은 여전했음을 보여준 사건으로, 이후 2002년 제2연평해전으로 다시 격화된다.</p>
