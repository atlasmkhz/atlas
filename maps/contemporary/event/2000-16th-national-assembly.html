<h1>제16대 국회의원 총선거</h1>
<p class="event-meta">2000년 4월 13일 · 전국</p>
<p class="summary">4월 13일 치러진 총선에서 여당 새천년민주당(1월 창당)은 제1당을 한나라당에 내주며 여소야대 국회를 맞았다. 이 선거에서 처음으로 시민단체 연대인 총선시민연대의 &quot;낙천·낙선운동&quot;이 본격화되며 유권자 운동이 선거 지형에 실질적 영향을 미친 사례로 기록됐다.</p>
