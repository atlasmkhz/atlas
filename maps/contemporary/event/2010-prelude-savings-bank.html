<h1>저축은행 부실사태 전조</h1>
<p class="event-meta">2010년 · 대한민국</p>
<p class="summary">부동산 프로젝트파이낸싱(PF) 대출에 과도하게 의존해온 다수의 저축은행들이 부실 징후를 보이기 시작했다. 정부는 이 해부터 구조조정에 착수했지만 근본적 부실을 막지 못했고, 결국 이듬해(2011) 부산저축은행 등 대형 저축은행들이 무더기로 영업정지되며 서민 예금자들이 큰 피해를 입는 사태로 번진다.</p>
