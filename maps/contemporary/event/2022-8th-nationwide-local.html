<h1>제8회 전국동시지방선거</h1>
<p class="event-meta">2022년 6월 1일 · 전국</p>
<p class="summary">대선 승리 직후 치러진 지방선거에서 여당 국민의힘이 17개 광역단체장 중 12곳을 차지하며 압승했다. 새 정부 출범 초기 밀월 효과가 반영된 결과로 평가되며, 국민의힘은 이 선거로 지방권력까지 폭넓게 장악했다.</p>
