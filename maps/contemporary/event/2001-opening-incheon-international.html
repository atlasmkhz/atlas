<h1>인천국제공항 개항</h1>
<p class="event-meta">2001년 3월 29일 · 인천 (영종도)</p>
<p class="summary">3월 29일 김포국제공항의 국제선 기능을 이어받는 인천국제공항이 영종도 간척지에 개항했다. IMF 위기 한복판에서도 계속된 대형 국책사업으로, 이후 세계 최고 수준의 서비스 공항으로 평가받으며 대한민국의 관문이자 성장의 상징적 인프라가 됐다.</p>
