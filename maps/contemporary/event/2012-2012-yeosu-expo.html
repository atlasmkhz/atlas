<h1>2012 여수 세계박람회</h1>
<p class="event-meta">2012년 5월 12일 · 전남 여수</p>
<p class="summary">&quot;살아있는 바다, 숨쉬는 연안&quot;을 주제로 한 여수세계박람회가 5월 12일부터 8월 12일까지 열려 820만 명이 다녀갔다. 2010년 G20에 이어 한국이 대형 국제행사를 성공적으로 개최한 사례로 꼽히지만, 사후 시설 활용 방안을 두고는 오랫동안 논란이 이어졌다.</p>
