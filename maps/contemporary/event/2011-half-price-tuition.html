<h1>반값등록금 시위</h1>
<p class="event-meta">2011년 6월 · 서울 (광화문)</p>
<p class="summary">등록금 부담이 가계에 심각한 압박으로 작용하자, 대학생들이 &quot;반값등록금&quot;을 요구하며 6월 대규모 촛불집회를 벌였다. 진보·보수를 가리지 않고 정치권 전체가 등록금 인하 공약을 내걸게 만든 드문 사례로, 이후 국가장학금 제도 확대의 정치적 동력이 됐다.</p>
