<h1>여성부 출범</h1>
<p class="event-meta">2001년 1월 26일 · 서울</p>
<p class="summary">여성 정책을 전담하는 중앙행정기관인 여성부가 신설됐다. 성폭력·가정폭력 방지, 여성 고용 평등, 성 주류화 정책 등을 총괄하는 부처로, 이후 여성가족부(2005)로 개편되며 지금까지 이어지고 있다. 신설 초기부터 부처 존치를 둘러싼 정치적 논쟁이 반복적으로 불거졌다.</p>
