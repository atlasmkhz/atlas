<h1>정묘호란 — 첫 번째 경고</h1>
<p class="event-meta">1627 · 평안북도 의주</p>
<p class="summary">인조반정으로 집권한 서인 정권이 친명배금(親明排金) 노선을 분명히 하자, 후금(훗날의 청)은 조선을 먼저 굴복시켜 배후를 안정시키려 침공했다. 조선은 강화도로 피난해 후금과 형제 관계를 맺는 정묘약조를 맺고 사태를 수습했지만, 이는 근본적 해결이 아니라 10년 뒤 더 큰 전쟁의 전조에 불과했다.</p>
